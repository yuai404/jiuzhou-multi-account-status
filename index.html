<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>九州多账号状态管理</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #020617;
      color: #e2e8f0;
    }
    .page-note {
      padding: 14px 16px;
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      font-size: 13px;
      line-height: 1.7;
    }
    .page-note code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
    .page-note strong {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="page-note">
    这是独立 HTML 版 <strong>v0.7.0</strong>。默认 API Base 为 <code>https://jz.faith.wang/api</code>，页面会以全屏横向布局打开管理面板，左边账号列表、右边账号详情。<br>
    已兼容本地图片验证码和腾讯点击验证码；如果你的浏览器或服务端策略阻止本地 HTML 跨域请求，或拦截腾讯验证码 SDK，请改用同目录的 Tampermonkey 版：
    <code>./jiuzhou-multi-account-status.user.js</code>
  </div>

  <script>
    window.__JZ_MULTI_ACCOUNT_TOOL_CONFIG__ = {
      version: '0.7.0',
      defaultApiBase: 'https://jz.faith.wang/api',
      open: true,
      layout: 'page',
      panelWidth: 1360,
    };
  </script>
  <script src="./jiuzhou-multi-account-status.user.js"></script>
</body>
</html>
