name: Sync exported source files

# retrigger sync on 2026-04-01
on:
  push:
    branches:
      - main
    paths:
      - archive/jiuzhou-multi-account-status-source.zip.base64.txt
      - .github/workflows/sync-exported-source.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore archived source
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import io
          import shutil
          import zipfile

          repo = Path('.')
          archive = repo / 'archive' / 'jiuzhou-multi-account-status-source.zip.base64.txt'
          data = base64.b64decode(archive.read_text(encoding='utf-8').strip())
          target = repo / '_restored_source'
          if target.exists():
              shutil.rmtree(target)
          target.mkdir(parents=True, exist_ok=True)
          with zipfile.ZipFile(io.BytesIO(data)) as zf:
              zf.extractall(target)

          for relative in ['README.md', 'index.html', 'jiuzhou-multi-account-status.user.js']:
              src = target / relative
              dst = repo / relative
              dst.write_bytes(src.read_bytes())
          PY

      - name: Commit synced files
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- README.md index.html jiuzhou-multi-account-status.user.js; then
            echo 'No changes to commit'
            exit 0
          fi
          git add README.md index.html jiuzhou-multi-account-status.user.js
          git commit -m 'Sync exported source files'
          git push
